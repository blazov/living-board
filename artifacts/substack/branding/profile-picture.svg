<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8927C" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#E8927C" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#E8927C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#F2A68B"/>
      <stop offset="50%" stop-color="#D4714E"/>
      <stop offset="100%" stop-color="#B85A3A"/>
    </radialGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="512" height="512" fill="#0B0F1A"/>

  <!-- Subtle star field -->
  <circle cx="67" cy="45" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="134" cy="89" r="0.8" fill="#ffffff" opacity="0.3"/>
  <circle cx="423" cy="67" r="1.2" fill="#ffffff" opacity="0.35"/>
  <circle cx="389" cy="134" r="0.7" fill="#ffffff" opacity="0.25"/>
  <circle cx="78" cy="198" r="0.9" fill="#ffffff" opacity="0.3"/>
  <circle cx="456" cy="223" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="34" cy="312" r="0.8" fill="#ffffff" opacity="0.2"/>
  <circle cx="478" cy="345" r="1.1" fill="#ffffff" opacity="0.35"/>
  <circle cx="123" cy="423" r="0.7" fill="#ffffff" opacity="0.3"/>
  <circle cx="345" cy="456" r="1" fill="#ffffff" opacity="0.25"/>
  <circle cx="234" cy="67" r="0.6" fill="#ffffff" opacity="0.2"/>
  <circle cx="456" cy="456" r="0.9" fill="#ffffff" opacity="0.3"/>
  <circle cx="56" cy="456" r="1" fill="#ffffff" opacity="0.35"/>
  <circle cx="289" cy="34" r="0.8" fill="#ffffff" opacity="0.25"/>
  <circle cx="167" cy="389" r="0.7" fill="#ffffff" opacity="0.2"/>
  <circle cx="400" cy="400" r="0.6" fill="#ffffff" opacity="0.3"/>

  <!-- Outer glow -->
  <circle cx="256" cy="256" r="180" fill="url(#glow)"/>

  <!-- Orbit rings - representing the loop -->
  <ellipse cx="256" cy="256" rx="120" ry="120" fill="none" stroke="#D4714E" stroke-width="0.5" opacity="0.15"/>
  <ellipse cx="256" cy="256" rx="88" ry="88" fill="none" stroke="#D4714E" stroke-width="0.6" opacity="0.2"/>
  <ellipse cx="256" cy="256" rx="56" ry="56" fill="none" stroke="#D4714E" stroke-width="0.8" opacity="0.25"/>

  <!-- Orbital dots - tasks in the loop -->
  <circle cx="376" cy="256" r="3" fill="#E8927C" opacity="0.6" filter="url(#blur2)"/>
  <circle cx="376" cy="256" r="2" fill="#F2A68B" opacity="0.9"/>

  <circle cx="193.6" cy="147.6" r="2.5" fill="#E8927C" opacity="0.5" filter="url(#blur2)"/>
  <circle cx="193.6" cy="147.6" r="1.5" fill="#F2A68B" opacity="0.8"/>

  <circle cx="193.6" cy="364.4" r="2.5" fill="#E8927C" opacity="0.5" filter="url(#blur2)"/>
  <circle cx="193.6" cy="364.4" r="1.5" fill="#F2A68B" opacity="0.8"/>

  <!-- Core orb -->
  <circle cx="256" cy="256" r="28" fill="url(#core)" filter="url(#blur1)"/>
  <circle cx="256" cy="256" r="24" fill="url(#core)"/>

  <!-- Inner light -->
  <circle cx="250" cy="248" r="8" fill="#F7C4A8" opacity="0.5"/>
  <circle cx="248" cy="246" r="4" fill="#FDDECB" opacity="0.6"/>
</svg>
