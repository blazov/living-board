name: Export snapshots to docs/data

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/export-snapshots.yml'

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch snapshots from Supabase
        run: |
          curl -s "https://ieekjkeayiclprdekxla.supabase.co/rest/v1/snapshots?select=id,content,active_goals,current_focus,recent_outcomes,open_blockers,key_learnings,cycle_count,created_at&order=created_at.asc" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -o docs/data/snapshots.json
          echo "Downloaded $(wc -c < docs/data/snapshots.json) bytes"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/snapshots.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update snapshots.json dataset"
            git push
          fi
